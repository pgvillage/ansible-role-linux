---
# defaults file for generic linux role for postgres servers

linux_pg_version: "17"

linux_users:
  hacluster:
    - name: postgres
      system: true
      uid: 26
    - name: avchecker
      system: true
    - name: pgquartz
      system: true
    - name: pgfga
      system: true
    - name: pgroute66
      system: true
  backup:
    - name: minio
      system: true

linux_groups:
  hacluster:
    - name: postgres
      system: true
      gid: 26
  backup:
    - name: minio
      system: true

# You can define what RH products should be enabled for a group of servers
# the custom filter (see filter_plugins/core.py) will convert this hash into a list of products only applying to that group
linux_rhsm_poolids: {}
#  postgres:
#    # Postgresql12_8Server
#    - "0360c0e471df0ab20171f34552980362"
#    # rhel_misc
#    - "0360c0e47b1a20e9017b81870656140a"
#  backup:
#    # rhel_misc
#    - "0360c0e47b1a20e9017b81870656140a"

linux_architecture: "{{ linux_architectures[ansible_facts.architecture] }}"

linux_package_state: present

linux_packages: "{{ _linux_packages[ansible_facts.pkg_mgr] }}"

_linux_packages:
  apt:
    hacluster:
      - "postgresql-{{ linux_pg_version | replace('.', '') }}"
      - "stolon"
      - "wal-g-pg"
      - "etcd"
    backup:
      - "minio"
    localhosts:
      - "chainsmith"
  dnf:
    hacluster:
      - "postgresql{{ linux_pg_version | replace('.', '') }}"
      - "postgresql{{ linux_pg_version | replace('.', '') }}-server"
      - "postgresql{{ linux_pg_version | replace('.', '') }}-contrib"
      - "postgresql{{ linux_pg_version | replace('.', '') }}-devel"
      - "postgresql{{ linux_pg_version | replace('.', '') }}-plpython3"
      - "stolon"
      - "wal-g-pg"
      - "etcd"
    backup:
      - "minio"
    localhosts:
      - "chainsmith"
  zypper:
    hacluster:
      - "postgresql{{ linux_pg_version | replace('.', '') }}"
      - "postgresql{{ linux_pg_version | replace('.', '') }}-server"
      - "postgresql{{ linux_pg_version | replace('.', '') }}-contrib"
      - "stolon"
      - "wal-g-pg"
      - "etcd"
      - "python3-psycopg2"
    backup:
      - "minio"

linux_public_repos: "{{ _linux_public_repos[ansible_facts.pkg_mgr] }}"

_linux_public_repos:
  dnf:
    - name: PgVillage
      description: PgVillage RPM Library - RHEL $releasever - $basearch
      baseurl: https://repo.mannemsolutions.nl/yum/pgvillage/latest/el$releasever/$basearch
      gpgkey: https://repo.mannemsolutions.nl/yum/pgvillage/gpg_pubkey.asc
      gpgcheck: true
      file: pgvillage
    - name: "pgdg-common"
      description: PostgreSQL common RPMs for RHEL / Rocky $releasever - $basearch
      baseurl: https://download.postgresql.org/pub/repos/yum/common/redhat/rhel-$releasever-$basearch
      enabled: true
      gpgcheck: true
      gpgkey: "{{ linux_gpg_key.dnf[ansible_facts.architecture] }}"
      # repo_gpgcheck: yes
      file: "pgdg-redhat-all"
      exclude: etcd
    - name: "pgdg-rhel-extras"
      description: Extra packages to support some RPMs in the PostgreSQL RPM repo RHEL / Rocky $releasever - $basearch
      baseurl: https://download.postgresql.org/pub/repos/yum/extras/redhat/rhel-$releasever-$basearch/
      enabled: true
      gpgcheck: true
      gpgkey: "{{ linux_gpg_key.dnf[ansible_facts.architecture] }}"
      # repo_gpgcheck: yes
      file: "pgdg-redhat-all"
      exclude: "etcd*"
    - name: "pgdg{{ linux_pg_version }}"
      description: "PostgreSQL {{ linux_pg_version }} for RHEL / Rocky $releasever - $basearch"
      baseurl: "https://download.postgresql.org/pub/repos/yum/{{ linux_pg_version }}/redhat/rhel-$releasever-$basearch"
      enabled: true
      gpgcheck: true
      gpgkey: "{{ linux_gpg_key.dnf[ansible_facts.architecture] }}"
      # repo_gpgcheck: yes
      file: "pgdg-redhat-all"
    - name: "epel"
      description: "Extra Packages for Enterprise Linux {{ ansible_facts.distribution_major_version }} - $basearch"
      metalink: "https://mirrors.fedoraproject.org/metalink?repo=epel-9&arch=$basearch&infra=$infra&content=$contentdir"
      enabled: true
      gpgcheck: "yes"
      gpgkey: "{{ linux_gpg_keys.dnf.epel }}"
      # repo_gpgcheck: yes
      file: "epel"
  zypper:
    - name: PgVillage
      description: PgVillage RPM Library - RHEL $releasever - $basearch
      repo: https://repo.mannemsolutions.nl/zypp/latest/{{ ansible_facts.distribution_major_version }}/$basearch
      priority: 10
      disable_gpg_check: true
    - name: "pgdg-common"
      description: PostgreSQL common RPMs for RHEL / Rocky $releasever - $basearch
      repo: https://download.postgresql.org/pub/repos/zypp/common/opensuse//leap-{{ ansible_facts.distribution_version }}-{{ ansible_facts.architecture }}/
      enabled: true
      priority: 20
    - name: "pgdg-rhel-extras"
      description: Extra packages to support some RPMs in the PostgreSQL RPM repo RHEL / Rocky $releasever - $basearch
      repo: https://download.postgresql.org/pub/repos/zypp/extras/opensuse//leap-{{ ansible_facts.distribution_version }}-{{ ansible_facts.architecture }}/
      enabled: true
      priority: 20
    - name: "pgdg{{ linux_pg_version }}"
      description: "PostgreSQL {{ linux_pg_version }} for RHEL / Rocky $releasever - $basearch"
      repo: "https://download.postgresql.org/pub/repos/zypp/{{ linux_pg_version }}/opensuse/\
        leap-{{ ansible_facts.distribution_version }}-{{ ansible_facts.architecture }}/"
      enabled: true
      priority: 20
  apt:
    - name: PgVillage
      description: "PgVillage DEB Library - Ubuntu {{ ansible_facts.distribution_version }} - {{ ansible_facts.architecture }}"
      repo: |
        [signed-by=/etc/apt/keyrings/pgvillage.asc arch={{ linux_architecture }}] https://repo.mannemsolutions.nl/apt/latest  {{ ansible_facts.distribution_release }} main
      priority: 10
    - name: "pgdg{{ linux_pg_version }}"
      description: "PostgreSQL {{ linux_pg_version }} for Ubuntu {{ ansible_facts.distribution_version }} - {{ ansible_facts.architecture }}"
      repo: |
        [signed-by=/etc/apt/keyrings/postgresql.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_facts.distribution_release }}-pgdg main
      enabled: true
      priority: 20

linux_disable_gpg_check: "false"

linux_gpg_keys:
  dnf:
    x86_64: https://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
    aarch64: https://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-AARCH64-RHEL
    # aarch64: "https://download.postgresql.org/pub/repos/yum/keys/RPM-GPG-KEY-PGDG-AARCH64-RHEL$releasever"
    epel: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_facts.distribution_major_version }}"
  zypper:
    sles15: https://download.postgresql.org/pub/repos/zypp/keys/PGDG-RPM-GPG-KEY-SLES15
    sles16: https://download.postgresql.org/pub/repos/zypp/keys/PGDG-RPM-GPG-KEY-SLES16
  apt:
    postgresql: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    pgvillage: https://repo.mannemsolutions.nl/apt/pgvillage.asc

linux_zypper_gpg_keys:
  - "{{ linux_gpg_keys.zypper.sles16 }}"

linux_rh_subscription: {}
#  activationkey: "ORG1"
#  org_id: "ORG1"
#  pool_ids: "{}"
#  state: present

# repository rhel_misc
linux_rh_misc_repo: {}
#  name: "Rhel_Misc"
#  description: "Rhel Misc repository"
#  baseurl: "http://satellite.example.org/pulp/content/ORG1/Library/custom/rhel_misc/rhel_misc/"
#  enabled: "true"
#  gpgcheck: "true"
#  gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
#  sslverify: "true"
#  sslcacert: /etc/rhsm/ca/katello-server-ca.pem
#  sslclientkey: /etc/pki/entitlement/8675925567367701300-key.pem
#  sslclientcert: /etc/pki/entitlement/8675925567367701300.pem
#  priority: "20"

# By enabling linux_poor_mans_dns, PgVillage will add entries to /etc/hosts for all hosts (except the ansible host)
# on all hosts
linux_poor_mans_dns: false
